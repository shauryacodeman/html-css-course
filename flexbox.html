<!doctype html>
<html>
  <head>
    <title>Flexbox practice</title>
  </head>
  <body style="padding-bottom:1000px;">
    <div style="display:flex;flex-direction:row">
      <div style="background-color: lightblue;">
        div1 text
      </div>
      <div style="background-color: lightpink;">
        div2
        <p>text</p>
      </div>
    </div>

    <div style="margin-top:30px;display:flex;flex-direction:row">
      <div style="background-color: lightblue;width:100px">
        div1 text
      </div>
      <div style="background-color: lightpink;flex:1;">
        flex1
      </div>
      <div style="background-color: lightblue;flex:2;">
        flex2
      </div>
    </div>

    <div style="margin-top:30px;
                display:flex;
                flex-direction:row;
                border-color:grey;
                border-style:solid;
                border-width:1px;
                height:70px;
                justify-content:center;">
      <div style="background-color: lightblue;width:100px;">
        div1
      </div>
      <div style="background-color: lightpink;width:100px;">
        flex1
      </div>
      <div style="background-color: lightblue;width:100px;">
        flex2
      </div>
    </div>  

    <div style="margin-top:30px;
                display:flex;
                flex-direction:row;
                border-color:grey;
                border-style:solid;
                border-width:1px;
                height:70px;
                justify-content:space-between;">
      <div style="background-color: lightblue;width:100px;">
        div1
      </div>
      <div style="background-color: lightpink;width:100px;">
        flex1
      </div>
      <div style="background-color: lightblue;width:100px;">
        flex2
      </div>
    </div> 

    <div style="margin-top:30px;
                display:flex;
                flex-direction:row;
                border-color:grey;
                border-style:solid;
                border-width:1px;
                height:70px;
                justify-content:space-between;
                align-items:center;">
      <div style="background-color: lightblue;width:100px;">
        div1
      </div>
      <div style="background-color: lightpink;width:100px;">
        flex1
      </div>
      <div style="background-color: lightblue;width:100px;">
        flex2
      </div>
    </div>
  </body>
</html>
